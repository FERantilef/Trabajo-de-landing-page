<!DOCTYPE html>
<html lang="en">
<head>

    <title>Restaurant</title>

<body>
    <header>
            <h1>Restaurant</h1>
        <nav id="navbar_items">
            <h3>Menu</h3>
            <h3>Reservaciones</h3>
            <h3>Acerca de nosotros</h3>
        </nav>
    </header>
    <section class="hero_section" >
            <!-- Recuerda cambiar las imagenes y el alt -->
        <div id="carouselExampleIndicators" class="carousel slide" >
            <div class="carousel-indicators">
                <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
                <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1" aria-label="Slide 2"></button>
                <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2" aria-label="Slide 3"></button>
            </div>
                <div class="carousel-inner">
                    <div class="carousel-item active">
                        <img src="/assets/Game of Thrones 8 Season Wallpaper[1920 × 1080] _ r_wallpapers.jpeg" class="d-block w-100" alt="...">
                    </div>
                    <div class="carousel-item">
                        <img src="/assets/group-friends-eating-restaurant.jpg" class="d-block w-100" alt="...">
                    </div>
                    <div class="carousel-item">
                        <img src="/assets/restaurant-interior.jpg" class="d-block w-100" alt="...">
                    </div>
                </div>
                <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Previous</span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="next">
                    <span class="carousel-control-next-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Next</span>
                </button>
        </div>
            <div id="principaltitle">

            </div>
            <div id="section_end">

    <div></div>
